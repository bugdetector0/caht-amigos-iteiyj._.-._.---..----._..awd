<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat dos Amigos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a12; font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ffffff18; border-radius: 4px; }

    /* LOGIN */
    #login-screen {
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, #0a0a12 60%);
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px;
      backdrop-filter: blur(20px); box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .login-header { text-align: center; margin-bottom: 36px; }
    .login-header .icon { font-size: 40px; margin-bottom: 12px; }
    .login-header h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px;
      color: #fff; letter-spacing: -1px; margin-bottom: 8px;
    }
    .login-header p { color: #ffffff55; font-size: 14px; font-weight: 300; }
    .field-label {
      display: block; color: #ffffff88; font-size: 12px; font-weight: 500;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    #name-input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      color: #fff; font-size: 16px; font-family: 'DM Sans', sans-serif;
      outline: none; transition: border 0.2s; margin-bottom: 20px;
    }
    #name-input:focus { border-color: rgba(255,255,255,0.3); }
    .colors-wrap { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
    .color-opt {
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all 0.2s;
    }
    .color-opt:hover { transform: scale(1.2); }
    .color-opt.selected { border-color: #fff; }
    #join-btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 600; font-family: 'Syne', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    #join-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .error-msg { color: #f87171; font-size: 12px; margin-top: -14px; margin-bottom: 14px; }

    /* CHAT */
    #chat-screen { height: 100dvh; display: flex; flex-direction: column; }
    #chat-header {
      padding: 16px 24px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02); flex-shrink: 0;
    }
    #chat-header h2 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      color: #fff; font-size: 18px; letter-spacing: -0.5px; flex: 1;
    }
    #msg-count { color: #ffffff44; font-size: 12px; }
    .avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; flex-shrink: 0;
      font-family: 'Syne', sans-serif; user-select: none;
    }
    #my-name-label { color: #ffffff66; font-size: 13px; }
    #exit-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #ffffff66; font-size: 12px;
      padding: 6px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 0;
      display: flex; flex-direction: column;
    }
    .empty-state { text-align: center; margin: auto; color: #ffffff22; padding: 40px; }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-family: 'Syne', sans-serif; font-size: 16px; }
    .msg-row {
      display: flex; align-items: flex-end; gap: 10;
      padding: 2px 20px;
    }
    .msg-row.gap-top { padding-top: 10px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-col { max-width: 65%; display: flex; flex-direction: column; gap: 3px; }
    .msg-row.mine .msg-col { align-items: flex-end; }
    .msg-row:not(.mine) .msg-col { align-items: flex-start; }
    .msg-sender { font-size: 12px; font-weight: 600; padding-left: 4px; }
    .bubble {
      padding: 10px 14px; color: #fff; font-size: 15px; line-height: 1.5;
      word-break: break-word; animation: slideIn 0.25s ease;
    }
    .bubble.mine { border-radius: 18px 18px 4px 18px; }
    .bubble.theirs { border-radius: 18px 18px 18px 4px; background: rgba(255,255,255,0.07); }
    .msg-time { color: #ffffff28; font-size: 10px; padding-left: 4px; }
    .reactions-row { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 4px; }
    .react-chip {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      font-size: 13px; color: #fff; display: flex; align-items: center; gap: 4px;
    }
    .react-chip.mine-react {
      background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);
    }
    .react-add-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      color: #ffffff88; font-size: 14px; opacity: 0; transition: opacity 0.2s;
    }
    .msg-row:hover .react-add-btn { opacity: 1; }
    .emoji-picker {
      position: absolute; bottom: 110%; background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 10px 12px; display: flex; gap: 8px; z-index: 100;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      animation: fadeUp 0.15s ease;
    }
    .emoji-picker button {
      background: none; border: none; cursor: pointer; font-size: 22px;
      transition: transform 0.1s;
    }
    .emoji-picker button:hover { transform: scale(1.3); }
    .typing-row {
      padding: 8px 20px; display: flex; align-items: center; gap: 10;
    }
    .typing-dots {
      display: flex; gap: 4px; background: rgba(255,255,255,0.07);
      border-radius: 20px; padding: 8px 14px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ffffff66; animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .typing-label { color: #ffffff44; font-size: 12px; }
    #input-area {
      padding: 12px 20px 20px; border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0; background: rgba(0,0,0,0.3);
    }
    .input-row {
      display: flex; gap: 10; align-items: flex-end;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 8px 12px 8px 18px;
    }
    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 15px; font-family: 'DM Sans', sans-serif;
      resize: none; line-height: 1.5; padding-top: 4px;
      max-height: 120px; overflow-y: auto;
    }
    #msg-input::placeholder { color: #ffffff44; }
    #send-btn {
      border: none; border-radius: 14px; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    #send-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }
    .input-hint {
      color: #ffffff22; font-size: 11px; text-align: center; margin-top: 8px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <div class="icon">💬</div>
      <h1>Entre no chat</h1>
      <p>As mensagens são partilhadas com todos</p>
    </div>
    <label class="field-label" for="name-input">O teu nome</label>
    <input id="name-input" type="text" maxlength="20" placeholder="Como te chamas?" />
    <p id="name-error" class="error-msg hidden"></p>
    <label class="field-label">A tua cor</label>
    <div class="colors-wrap" id="colors-wrap"></div>
    <button id="join-btn">Entrar no chat →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="hidden">
  <div id="chat-header">
    <span style="font-size:22px">💬</span>
    <div style="flex:1">
      <h2>Chat dos Amigos</h2>
      <span id="msg-count">0 mensagens</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="my-avatar" class="avatar" style="width:32px;height:32px;font-size:14px"></div>
      <span id="my-name-label"></span>
    </div>
    <button id="exit-btn">Sair</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">✨</div>
      <p>Sê o primeiro a escrever!</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="Escreve uma mensagem..."></textarea>
      <button id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter para enviar</p>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    query, orderBy, serverTimestamp, doc, updateDoc, limit
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBY_JD0TvywKu7_3GfVZwo3o9-hvi4A6qI",
    authDomain: "chat-6cc2c.firebaseapp.com",
    projectId: "chat-6cc2c",
    storageBucket: "chat-6cc2c.firebasestorage.app",
    messagingSenderId: "614250159090",
    appId: "1:614250159090:web:5185e0649a65eb52b9a96b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const COLORS = [
    "#f472b6","#60a5fa","#34d399","#fb923c","#a78bfa","#fbbf24"
  ];
  const EMOJIS = ["😄","❤️","👍","😂","🔥","✨","🎉","😮"];

  let myName = "";
  let myColor = COLORS[0];
  let openEmojiFor = null;
  let typingTimer = null;
  let unsubMessages = null;

  // --- Build color picker ---
  const colorsWrap = document.getElementById("colors-wrap");
  COLORS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "color-opt" + (c === myColor ? " selected" : "");
    btn.style.background = c;
    btn.style.boxShadow = c === myColor ? `0 0 16px ${c}88` : "";
    btn.onclick = () => {
      myColor = c;
      document.querySelectorAll(".color-opt").forEach(b => {
        b.classList.remove("selected");
        b.style.boxShadow = "";
      });
      btn.classList.add("selected");
      btn.style.boxShadow = `0 0 16px ${c}88`;
      updateJoinBtn();
    };
    colorsWrap.appendChild(btn);
  });

  function updateJoinBtn() {
    const btn = document.getElementById("join-btn");
    btn.style.background = `linear-gradient(135deg, ${myColor}, ${myColor}aa)`;
    btn.style.boxShadow = `0 8px 24px ${myColor}44`;
  }
  updateJoinBtn();

  // --- Join ---
  document.getElementById("join-btn").onclick = join;
  document.getElementById("name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") join();
  });

  function join() {
    const name = document.getElementById("name-input").value.trim();
    const err = document.getElementById("name-error");
    if (!name) { err.textContent = "Escreve o teu nome!"; err.classList.remove("hidden"); return; }
    err.classList.add("hidden");
    myName = name;
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("chat-screen").classList.remove("hidden");
    document.getElementById("my-name-label").textContent = myName;
    const av = document.getElementById("my-avatar");
    av.textContent = myName[0].toUpperCase();
    av.style.background = `radial-gradient(circle at 35% 35%, ${myColor}cc, ${myColor}55)`;
    av.style.border = `2px solid ${myColor}`;
    av.style.boxShadow = `0 0 12px ${myColor}44`;
    startListening();
    document.getElementById("msg-input").focus();
  }

  // --- Exit ---
  document.getElementById("exit-btn").onclick = () => {
    if (unsubMessages) unsubMessages();
    document.getElementById("chat-screen").classList.add("hidden");
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("messages").innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="big-icon">✨</div>
        <p>Sê o primeiro a escrever!</p>
      </div>`;
  };

  // --- Send ---
  document.getElementById("send-btn").onclick = sendMsg;
  document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  document.getElementById("msg-input").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
    updateSendBtn();
    sendTypingIndicator();
    clearTimeout(typingTimer);
    typingTimer = setTimeout(clearTypingIndicator, 2500);
  });

  function updateSendBtn() {
    const hasText = document.getElementById("msg-input").value.trim();
    const btn = document.getElementById("send-btn");
    btn.style.background = hasText ? `linear-gradient(135deg, ${myColor}, ${myColor}aa)` : "rgba(255,255,255,0.08)";
    btn.style.boxShadow = hasText ? `0 4px 16px ${myColor}44` : "none";
  }

  async function sendMsg() {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    input.style.height = "auto";
    updateSendBtn();
    clearTypingIndicator();
    await addDoc(collection(db, "messages"), {
      name: myName, color: myColor, text,
      ts: serverTimestamp(), reactions: {}
    });
  }

  // --- Typing ---
  async function sendTypingIndicator() {
    try {
      await updateDoc(doc(db, "typing", "status"), {
        [myName]: { color: myColor, ts: Date.now() }
      });
    } catch {
      // doc may not exist yet, create it
      try {
        const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        await setDoc(doc(db, "typing", "status"), {
          [myName]: { color: myColor, ts: Date.now() }
        }, { merge: true });
      } catch {}
    }
  }

  async function clearTypingIndicator() {
    try {
      const { deleteField, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await setDoc(doc(db, "typing", "status"), { [myName]: deleteField() }, { merge: true });
    } catch {}
  }

  // --- Listen ---
  function startListening() {
    const q = query(collection(db, "messages"), orderBy("ts"), limit(200));
    unsubMessages = onSnapshot(q, snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderMessages(msgs);
    });

    onSnapshot(doc(db, "typing", "status"), snap => {
      if (!snap.exists()) return;
      const data = snap.data();
      const now = Date.now();
      const others = Object.entries(data)
        .filter(([name, v]) => name !== myName && now - v.ts < 3000)
        .map(([name]) => name);
      renderTyping(others);
    });
  }

  // --- Render ---
  function renderMessages(msgs) {
    const container = document.getElementById("messages");
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;

    document.getElementById("msg-count").textContent =
      `${msgs.length} mensagem${msgs.length !== 1 ? "s" : ""}`;

    if (msgs.length === 0) {
      container.innerHTML = `<div class="empty-state" id="empty-state"><div class="big-icon">✨</div><p>Sê o primeiro a escrever!</p></div>`;
      return;
    }

    container.innerHTML = "";
    msgs.forEach((msg, i) => {
      const mine = msg.name === myName;
      const prevSame = i > 0 && msgs[i-1].name === msg.name;
      const row = document.createElement("div");
      row.className = `msg-row${mine ? " mine" : ""}${!prevSame ? " gap-top" : ""}`;

      // Avatar
      if (!mine) {
        const av = document.createElement("div");
        av.className = "avatar";
        av.style.cssText = `width:34px;height:34px;font-size:14px;
          background:radial-gradient(circle at 35% 35%,${msg.color}cc,${msg.color}55);
          border:2px solid ${msg.color};box-shadow:0 0 12px ${msg.color}44;
          opacity:${prevSame ? 0 : 1};`;
        av.textContent = msg.name[0].toUpperCase();
        row.appendChild(av);
      }

      // Column
      const col = document.createElement("div");
      col.className = "msg-col";

      if (!mine && !prevSame) {
        const sender = document.createElement("span");
        sender.className = "msg-sender";
        sender.style.color = msg.color;
        sender.textContent = msg.name;
        col.appendChild(sender);
      }

      // Bubble + react btn row
      const bubbleRow = document.createElement("div");
      bubbleRow.style.cssText = "position:relative;display:flex;align-items:center;gap:6px;flex-direction:" + (mine ? "row" : "row-reverse");

      const reactBtn = document.createElement("button");
      reactBtn.className = "react-add-btn";
      reactBtn.textContent = "+";
      reactBtn.onclick = (e) => {
        e.stopPropagation();
        if (openEmojiFor === msg.id) { closeEmojiPicker(); return; }
        closeEmojiPicker();
        openEmojiFor = msg.id;
        const picker = document.createElement("div");
        picker.className = "emoji-picker";
        picker.id = "emoji-picker";
        picker.style[mine ? "right" : "left"] = "0";
        EMOJIS.forEach(em => {
          const b = document.createElement("button");
          b.textContent = em;
          b.onclick = () => addReaction(msg.id, em);
          picker.appendChild(b);
        });
        bubbleRow.appendChild(picker);
      };

      const bubble = document.createElement("div");
      bubble.className = `bubble ${mine ? "mine" : "theirs"}`;
      if (mine) {
        bubble.style.background = `linear-gradient(135deg,${myColor}cc,${myColor}88)`;
        bubble.style.boxShadow = `0 4px 16px ${myColor}33`;
      }
      bubble.textContent = msg.text;

      bubbleRow.appendChild(reactBtn);
      bubbleRow.appendChild(bubble);
      col.appendChild(bubbleRow);

      // Reactions
      if (msg.reactions && Object.keys(msg.reactions).length > 0) {
        const reactRow = document.createElement("div");
        reactRow.className = "reactions-row";
        Object.entries(msg.reactions).forEach(([emoji, users]) => {
          if (!users || users.length === 0) return;
          const chip = document.createElement("button");
          chip.className = "react-chip" + (users.includes(myName) ? " mine-react" : "");
          chip.innerHTML = `${emoji} <span style="font-size:11px;opacity:.7">${users.length}</span>`;
          chip.onclick = () => addReaction(msg.id, emoji);
          reactRow.appendChild(chip);
        });
        col.appendChild(reactRow);
      }

      // Time
      const time = document.createElement("span");
      time.className = "msg-time";
      if (msg.ts?.toDate) {
        const d = msg.ts.toDate();
        time.textContent = d.toLocaleTimeString("pt-PT", { hour: "2-digit", minute: "2-digit" });
      }
      col.appendChild(time);

      row.appendChild(col);
      container.appendChild(row);
    });

    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  function renderTyping(names) {
    const existing = document.getElementById("typing-row");
    if (existing) existing.remove();
    if (names.length === 0) return;
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing-row";
    row.innerHTML = `
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span class="typing-label">${names.join(", ")} está a escrever...</span>`;
    document.getElementById("messages").appendChild(row);
  }

  function closeEmojiPicker() {
    const p = document.getElementById("emoji-picker");
    if (p) p.remove();
    openEmojiFor = null;
  }
  document.addEventListener("click", closeEmojiPicker);

  async function addReaction(msgId, emoji) {
    closeEmojiPicker();
    const msgRef = doc(db, "messages", msgId);
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(msgRef);
    if (!snap.exists()) return;
    const reactions = { ...(snap.data().reactions || {}) };
    const users = reactions[emoji] ? [...reactions[emoji]] : [];
    const idx = users.indexOf(myName);
    if (idx >= 0) users.splice(idx, 1); else users.push(myName);
    if (users.length === 0) delete reactions[emoji]; else reactions[emoji] = users;
    await updateDoc(msgRef, { reactions });
  }
</script>
</body>
</html>
